<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Police MDT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.0.276/pdf.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0b1119;
    color:white;
    overflow:hidden;
}

/* LOGIN */

#loginScreen{
    position:fixed;
    inset:0;
    background:#0b1119;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.login-box{
    width:400px;
    background:#121b26;
    border:1px solid #1f2d3d;
    padding:30px;
    border-radius:12px;
}

.login-box h1{
    margin-bottom:20px;
}

.login-box input,
.login-box select{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#091018;
    border:1px solid #243445;
    color:white;
    border-radius:8px;
}

.login-box button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    background:#1f6feb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* APP */

#app{
    display:none;
    height:100vh;
    flex-direction:column;
}

/* HEADER */

header{
    height:70px;
    background:#121b26;
    border-bottom:1px solid #1d2b3a;
    display:flex;
    align-items:center;
    padding:0 20px;
    justify-content:space-between;
}

.tabs{
    display:flex;
    gap:10px;
}

.tab-btn{
    background:#16212e;
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

.tab-btn.active{
    background:#1f6feb;
}

.officer{
    color:#7d8ea3;
}

/* CONTENT */

.content{
    flex:1;
    overflow:hidden;
    position:relative;
}

.page{
    display:none;
    height:100%;
}

.page.active{
    display:flex;
}

/* LAWS */

#lawsPage{
    display:flex;
}

.sidebar{
    width:320px;
    background:#101821;
    border-right:1px solid #1f2d3d;
    padding:15px;
    overflow:auto;
}

.sidebar h2{
    margin-bottom:15px;
}

.search-box{
    width:100%;
    padding:12px;
    background:#091018;
    border:1px solid #243445;
    color:white;
    border-radius:8px;
    margin-bottom:15px;
}

.result{
    background:#17222f;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
}

.result:hover{
    background:#1d2b3a;
}

.result-law{
    color:#4da3ff;
    font-size:14px;
}

.result-page{
    color:#8899aa;
    font-size:12px;
    margin-top:5px;
}

.viewer{
    flex:1;
    background:#0d141d;
    position:relative;
}

.viewer iframe{
    width:100%;
    height:100%;
    border:none;
}

/* MAP */

#mapPage{
    position:relative;
    overflow:hidden;
    background:#091018;
}

#mapImage{
    position:absolute;
    cursor:grab;
    user-select:none;
    transform-origin:center;
}

/* REPORTS */

#reportsPage{
    padding:30px;
    overflow:auto;
    flex-direction:column;
    gap:15px;
}

.report-box{
    max-width:700px;
    background:#121b26;
    padding:20px;
    border-radius:12px;
}

.report-box input,
.report-box textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#091018;
    border:1px solid #243445;
    color:white;
    border-radius:8px;
}

.report-box button{
    margin-top:15px;
    padding:12px;
    background:#1f6feb;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.generated{
    margin-top:20px;
    background:#091018;
    padding:15px;
    border-radius:8px;
    white-space:pre-wrap;
}

/* SCROLL */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#243445;
    border-radius:10px;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="login-box">

        <h1>Police MDT</h1>

        <input type="text" id="officerName" placeholder="Officer Name">

        <select id="officerRank">
            <option>CSI</option>
            <option>Detective I</option>
            <option>Detective II</option>
            <option>Lieutenant</option>
            <option>Staff</option>
        </select>

        <button onclick="login()">ENTER SYSTEM</button>

    </div>

</div>

<!-- APP -->

<div id="app">

    <header>

        <div class="tabs">

            <button class="tab-btn active" onclick="switchPage('lawsPage', this)">
                Zákony
            </button>

            <button class="tab-btn" onclick="switchPage('mapPage', this)">
                Mapa
            </button>

            <button class="tab-btn" onclick="switchPage('reportsPage', this)">
                Předtisky
            </button>

        </div>

        <div class="officer" id="officerDisplay"></div>

    </header>

    <div class="content">

        <!-- LAWS -->

        <div class="page active" id="lawsPage">

            <div class="sidebar">

                <h2>Zákony</h2>

                <input
                    type="text"
                    class="search-box"
                    placeholder="Vyhledat..."
                    id="lawSearch"
                >

                <div id="results"></div>

            </div>

            <div class="viewer">

                <iframe
                    id="pdfViewer"
                    src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https://www.enjoyrp.cz/zakonnik/14-2001-Trestní%20zákoník%20a%20řád.pdf">
                </iframe>

            </div>

        </div>

        <!-- MAP -->

        <div class="page" id="mapPage">

            <img
                id="mapImage"
                src="https://i.imgur.com/k7xWOfA.png"
            >

        </div>

        <!-- REPORTS -->

        <div class="page" id="reportsPage">

            <div class="report-box">

                <h2>Nesouhlas s trestem</h2>

                <input type="text" id="suspectName" placeholder="Jméno osoby">

                <textarea
                    id="reason"
                    rows="6"
                    placeholder="Důvod nesouhlasu">
                </textarea>

                <button onclick="generateReport()">
                    Vygenerovat
                </button>

                <div class="generated" id="generatedReport"></div>

                <button onclick="copyReport()">
                    Kopírovat
                </button>

            </div>

        </div>

    </div>

</div>

<script>

/* =========================
   APP STATE
========================= */

const appState = {

    officer: null,

    laws: [
        {
            name: "Trestní zákoník",
            url: "https://www.enjoyrp.cz/zakonnik/14-2001-Trestní%20zákoník%20a%20řád.pdf"
        }
    ],

    searchIndex: []

}

/* =========================
   SYNONYMS
========================= */

const legalSynonyms = {

    "domovní prohlídka": [
        "vstup do obydlí",
        "obydlí",
        "prohlídka"
    ],

    "vydírání": [
        "nátlak",
        "vyhrožování",
        "donucení"
    ]

}

/* =========================
   LOGIN
========================= */

function login(){

    const name = document.getElementById("officerName").value.trim()

    const rank = document.getElementById("officerRank").value

    if(!name){
        alert("Vyplň jméno")
        return
    }

    appState.officer = {
        name,
        rank
    }

    localStorage.setItem(
        "mdtOfficer",
        JSON.stringify(appState.officer)
    )

    document.getElementById("officerDisplay").textContent =
        `${rank} | ${name}`

    document.getElementById("loginScreen").style.display = "none"

    document.getElementById("app").style.display = "flex"

}

/* AUTO LOGIN */

const savedOfficer = localStorage.getItem("mdtOfficer")

if(savedOfficer){

    appState.officer = JSON.parse(savedOfficer)

    document.getElementById("officerDisplay").textContent =
        `${appState.officer.rank} | ${appState.officer.name}`

    document.getElementById("loginScreen").style.display = "none"

    document.getElementById("app").style.display = "flex"

}

/* =========================
   TABS
========================= */

function switchPage(pageId, btn){

    document.querySelectorAll(".page")
        .forEach(p => p.classList.remove("active"))

    document.querySelectorAll(".tab-btn")
        .forEach(b => b.classList.remove("active"))

    document.getElementById(pageId)
        .classList.add("active")

    btn.classList.add("active")

}

/* =========================
   SEARCH
========================= */

const sampleData = [

    {
        law: "Trestní zákoník",
        page: 45,
        text: "Domovní prohlídka může být provedena..."
    },

    {
        law: "Trestní zákoník",
        page: 88,
        text: "Vstup do obydlí bez souhlasu..."
    },

    {
        law: "Trestní zákoník",
        page: 140,
        text: "Vydírání a psychický nátlak..."
    }

]

document
    .getElementById("lawSearch")
    .addEventListener("input", debounce(searchLaws, 300))

function searchLaws(e){

    const query = e.target.value
        .trim()
        .toLowerCase()

    const resultsEl = document.getElementById("results")

    resultsEl.innerHTML = ""

    if(!query) return

    const expanded = [
        query,
        ...(legalSynonyms[query] || [])
    ]

    const results = sampleData.filter(item => {

        return expanded.some(term =>
            item.text.toLowerCase().includes(term)
        )

    })

    results.forEach(result => {

        const div = document.createElement("div")

        div.className = "result"

        div.innerHTML = `
            <div class="result-law">
                ${result.law}
            </div>

            <div>
                ${result.text}
            </div>

            <div class="result-page">
                Strana ${result.page}
            </div>
        `

        div.onclick = () => {

            document.getElementById("pdfViewer").src =
                `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(appState.laws[0].url)}#page=${result.page}`

        }

        resultsEl.appendChild(div)

    })

}

/* =========================
   REPORTS
========================= */

function generateReport(){

    const suspect =
        document.getElementById("suspectName").value

    const reason =
        document.getElementById("reason").value

    const date =
        new Date().toLocaleDateString("cs-CZ")

    const officer =
        appState.officer.name

    const text =

`Já, Officer ${officer},
dne ${date},

nesouhlasím s uloženým trestem vůči osobě ${suspect}.

Odůvodnění:
${reason}`

    document.getElementById("generatedReport")
        .textContent = text

}

function copyReport(){

    const text =
        document.getElementById("generatedReport")
        .textContent

    navigator.clipboard.writeText(text)

    alert("Zkopírováno")

}

/* =========================
   MAP
========================= */

const map = document.getElementById("mapImage")

let scale = 1
let pos = { x: 0, y: 0 }

let dragging = false

let startX = 0
let startY = 0

map.addEventListener("mousedown", e => {

    dragging = true

    startX = e.clientX - pos.x
    startY = e.clientY - pos.y

})

window.addEventListener("mouseup", () => {

    dragging = false

})

window.addEventListener("mousemove", e => {

    if(!dragging) return

    pos.x = e.clientX - startX
    pos.y = e.clientY - startY

    updateMap()

})

window.addEventListener("wheel", e => {

    scale += e.deltaY * -0.001

    scale = Math.min(Math.max(0.5, scale), 4)

    updateMap()

})

function updateMap(){

    map.style.transform =
        `translate(${pos.x}px, ${pos.y}px) scale(${scale})`

}

updateMap()

/* =========================
   UTIL
========================= */

function debounce(fn, delay){

    let timeout

    return (...args) => {

        clearTimeout(timeout)

        timeout = setTimeout(() => {
            fn(...args)
        }, delay)

    }

}

</script>

</body>
</html>
